<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaMind - System Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #07130e; color: #d1d5db; font-family: 'Inter', sans-serif; }
        .sidebar-item-active { background-color: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.3); }
        
        .tabs-container { background-color: #12241d; padding: 6px; border-radius: 12px; display: inline-flex; gap: 8px; }
        .tab-btn { padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.2s; color: #9ca3af; }
        .tab-btn-active { background-color: #10b981; color: #07130e; font-weight: 600; }

        .alert-card { border-radius: 12px; padding: 24px; margin-bottom: 16px; border-left: 4px solid transparent; transition: transform 0.2s; }
        .alert-card:hover { transform: translateX(4px); }
        
        .critical { background-color: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); border-left-color: #ef4444; }
        .warning { background-color: rgba(234, 179, 8, 0.05); border: 1px solid rgba(234, 179, 8, 0.2); border-left-color: #eab308; }
        .info { background-color: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-left-color: #10b981; }

        .badge { font-size: 10px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .badge-critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-warning { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .badge-info { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 border-r border-emerald-900/30 p-6 flex flex-col gap-8">
        <div class="flex items-center gap-3 text-emerald-400 font-bold text-2xl">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg"></div>
            AquaMind
        </div>
        <nav class="flex-col space-y-2 text-gray-400">
    <a href="dashboard.html" class="nav-link p-3 flex items-center gap-3 rounded-lg hover:bg-emerald-900/20 hover:text-emerald-400 transition-colors">
        <span>⊞</span> Dashboard
    </a>
    
    <a href="analytics.html" class="nav-link p-3 flex items-center gap-3 rounded-lg hover:bg-emerald-900/20 hover:text-emerald-400 transition-colors">
        <span>📊</span> Analytics
    </a>
    
    <a href="ai-decision.html" class="nav-link p-3 flex items-center gap-3 rounded-lg hover:bg-emerald-900/20 hover:text-emerald-400 transition-colors">
        <span>🧠</span> AI Decision
    </a>
    
    <a href="alerts.html" class="nav-link p-3 flex items-center gap-3 rounded-lg hover:bg-emerald-900/20 hover:text-emerald-400 transition-colors">
        <span>🔔</span> Alerts
    </a>
    
    <a href="farm-zones.html" class="nav-link p-3 flex items-center gap-3 rounded-lg hover:bg-emerald-900/20 hover:text-emerald-400 transition-colors">
        <span>🗺️</span> Farm Zones
    </a>

   
</nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-white">System Alerts</h1>
            <div class="flex items-center gap-6">
                <span class="text-red-500 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span> 2 Critical
                </span>
                <span class="text-emerald-500 text-sm flex items-center gap-2 font-medium">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> System Online
                </span>
                <div class="w-10 h-10 bg-gray-800 rounded-full border border-emerald-500/50"></div>
            </div>
        </header>

        <div class="tabs-container mb-8">
            <div class="tab-btn tab-btn-active" data-filter="all">All Alerts</div>
            <div class="tab-btn" data-filter="critical">Critical <span class="ml-1 opacity-60">(2)</span></div>
            <div class="tab-btn" data-filter="warning">Warnings <span class="ml-1 opacity-60">(2)</span></div>
        </div>

        <div id="alertList">
            </div>
    </main>

    <script src="alerts.js"></script>
</body>
</html>
